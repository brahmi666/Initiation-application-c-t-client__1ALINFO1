<div class="details-container">
  <div class="details-card">
    <div class="details-header">
      <span class="status-badge" [ngClass]="'status-' + (status || 'en_attente').replace(' ', '_')">{{ status }}</span>
      <h1 class="details-title">{{ titre }}</h1>
      <div class="details-meta">
        <span class="category">{{ category }}</span>
        <span class="date" *ngIf="date">{{ date | date:'dd MMM yyyy' }}</span>
      </div>
    </div>
    
    <div class="details-body">
      <h3>Description</h3>
      <p>{{ description }}</p>
    </div>

    <div class="details-footer">
      <div class="likes-count">
        ❤️ {{ likes }} Likes
      </div>
      <button class="btn-back" (click)="goback()">← Retour à la liste</button>
    </div>
  </div>
</div>
