<div class="suggestions-container">

  <header class="search-section">
    <h1 class="title-main">Liste des suggestions</h1>
    <div style="display: flex; gap: 1rem; align-items: center; justify-content: center;">
      <input 
        type="text" 
        class="search-input" 
        style="max-width: 400px;" 
        placeholder="Rechercher une suggestion" 
        [(ngModel)]="searchTerm"
      >
      <a routerLink="ajouter" class="btn btn-add" style="text-decoration: none; white-space: nowrap;">+ Ajouter Suggestion</a>
    </div>
  </header>
  <div class="suggestions-list">
    <div *ngFor="let suggestion of suggestions" class="suggestion-card">
      <div class="suggestion-header">
        <h3 class="suggestion-title">{{ suggestion.title }}</h3>
        <div class="category-info">
          <span class="category">{{ suggestion.category }}</span>
        </div>
      </div>
      
      <p class="suggestion-desc">{{ suggestion.description }}</p>

      <div class="status-badge" [ngClass]="'status-' + (suggestion.status || 'en_attente').replace(' ', '_')">
        {{ suggestion.status }}
      </div>
      
      <footer class="actions">
        <span style="font-weight: 600; flex-grow: 1; align-self: center;">❤️ {{ suggestion.nbLikes }} Likes</span>
        
        <!-- Link to the details page -->
        <a [routerLink]="['detail', suggestion.id]" style="text-decoration: none;">
          <button class="btn btn-details">Voir les détails ></button>
        </a>
      </footer>
    </div>
  </div>

  <section class="favorites-section" *ngIf="favoriteSuggestions.length > 0">
    <h2 class="favorites-title">Mes Favoris</h2>
    <div class="suggestions-list">
      <div *ngFor="let fav of favoriteSuggestions" class="suggestion-card" style="padding: 1rem;">
        <h3 style="margin: 0; font-size: 1.1rem;">{{ fav.title }}</h3>
        <span class="category" style="font-size: 0.8rem;">{{ fav.category }}</span>
      </div>
    </div>
  </section>

</div>
